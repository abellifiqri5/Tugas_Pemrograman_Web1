<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas Web 1 - Kasir Sepatu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            padding: 30px;
        }
        .container {
            background: #911e1e;
            width: 320px;
            margin: auto;
            padding: 20px;
            border: 2px solid #fcfcfc;
        }
        h3 {
            text-align: center;
            margin-top: 0;
            text-transform: uppercase;
        }
        .form-grup {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
        }
        select, input, button {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #000000;
            color: rgb(255, 255, 255);
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .total {
            margin-top: 15px;
            background: #e1e1e1;
            padding: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;

            
    }
    </style>
</head>
<body>

<div class="container">
    <h3>OFF THE WALL</h3>
    
    <div class="form-grup">
        <label>Pilih Model:</label>
        <select id="hargaSepatu">
            <option value="1149000">Vans Old Skool - Rp 1.149.000</option>
            <option value="1049000">Vans Slip-On - Rp 1.049.000</option>
            <option value="999000">Vans Authentic - Rp 999.000</option>
        </select>
    </div>

    <div class="form-grup">
        <label>Jumlah barang:</label>
        <input type="number" id="qty" value="1" min="1">
    </div>

    <button onclick="hitung()">Total</button>

    <div class="total" id="hasil">
        Total: Rp 1.149.000
    </div>
</div>

<script>
    function hitung() {
        // Ambil nilai dari inputan HTML
        let harga = parseInt(document.getElementById("hargaSepatu").value);
        let jumlah = parseInt(document.getElementById("qty").value);
        
        // OPERATOR ARITMATIKA (PERKALIAN)
        harga = harga * jumlah; 
        let diskon = 10000;
        let total = harga - diskon;
        // Cetak hasil dengan format rupiah standar
        document.getElementById("hasil").innerText = "Total: Rp " + total.toLocaleString('id-ID');
    }
</script>

</body>
</html>

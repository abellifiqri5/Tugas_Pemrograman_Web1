<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧱 Tetris Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧱 TETRIS</h1>
        
        <div class="game-wrapper">
            <!-- Game Board -->
            <div class="board-container">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>

            <!-- Info Panel -->
            <div class="info-panel">
                <div class="info-box">
                    <h3>📊 SKOR</h3>
                    <div id="score">0</div>
                </div>
                
                <div class="info-box">
                    <h3>📈 LEVEL</h3>
                    <div id="level">1</div>
                </div>
                
                <div class="info-box">
                    <h3>📏 BARIS</h3>
                    <div id="lines">0</div>
                </div>
                
                <div class="info-box">
                    <h3>🔮 NEXT</h3>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>

                <div class="controls-info">
                    <h4>🎮 Kontrol:</h4>
                    <p>⬅️ ➡️ = Gerak</p>
                    <p>⬆️ = Rotasi</p>
                    <p>⬇️ = Turun Cepat</p>
                    <p>Space = Drop</p>
                    <p>P = Pause</p>
                </div>

                <button id="startBtn" class="btn btn-start">▶️ Mulai</button>
                <button id="pauseBtn" class="btn btn-pause" disabled>⏸️ Pause</button>
                <button id="resetBtn" class="btn btn-reset">🔄 Reset</button>
            </div>
        </div>

        <div id="gameOverModal" class="modal">
            <div class="modal-content">
                <h2>🎮 GAME OVER</h2>
                <p>Skor Akhir: <span id="finalScore">0</span></p>
                <p>Level: <span id="finalLevel">1</span></p>
                <p>Baris: <span id="finalLines">0</span></p>
                <button id="playAgainBtn" class="btn btn-start">🔄 Main Lagi</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

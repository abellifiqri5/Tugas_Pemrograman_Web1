<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h2, h3 {
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .form-group label {
            width: 100px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 250px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-container {
            margin-top: 20px;
            margin-bottom: 30px;
        }
        button {
            padding: 8px 15px;
            margin-right: 10px;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid #aaa;
            background-color: #e9e9e9;
            border-radius: 4px;
        }
        button:hover {
            background-color: #ddd;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #fff;
        }
        table, th, td {
            border: 1px solid #bbb;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #eaeaea;
        }
        .btn-edit {
            background-color: #ffc107;
            border: 1px solid #dc3545;
            color: black;
            padding: 3px 8px;
            margin-right: 5px;
        }
        .btn-delete {
            background-color: #dc3545;
            border: 1px solid #bd2130;
            color: white;
            padding: 3px 8px;
        }
        .btn-edit:hover { background-color: #e0a800; }
        .btn-delete:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <h2>Data Mahasiswa</h2>
    
    <div class="form-group">
        <label for="nim">NIM:</label>
        <input type="text" id="nim">
    </div>
    <div class="form-group">
        <label for="nama">Nama:</label>
        <input type="text" id="nama">
    </div>
    <div class="form-group">
        <label for="jurusan">Jurusan:</label>
        <select id="jurusan">
            <option value="Teknik Informatika">Teknik Informatika</option>
            <option value="Sistem Informasi">Sistem Informasi</option>
            <option value="Sistem Komputer">Sistem Komputer</option>
        </select>
    </div>
    <div class="form-group">
        <label for="fakultas">Fakultas:</label>
        <select id="fakultas">
            <option value="Ilmu Komputer">Ilmu Komputer</option>
            <option value="Teknik">Teknik</option>
            <option value="Ekonomi">Ekonomi</option>
        </select>
    </div>

    <div class="btn-container">
        <button id="btnTambah" onclick="tambahMahasiswa()">Tambah Mahasiswa</button>
        <button id="btnUpdate" onclick="updateMahasiswa()" style="display:none;">Update Data Mahasiswa</button>
        <button id="btnBatal" onclick="resetForm()" style="display:none;">Batal</button>
    </div>

    <h3>Daftar Mahasiswa</h3>
    
    <table>
        <thead>
            <tr>
                <th style="width: 20%;">NIM</th>
                <th style="width: 25%;">Nama</th>
                <th style="width: 20%;">Jurusan</th>
                <th style="width: 20%;">Fakultas</th>
                <th style="width: 15%;">Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelMahasiswa">
        </tbody>
    </table>

    <script>
       
        let dataMahasiswa = JSON.parse(localStorage.getItem("dataMahasiswa")) || [
            { nim: "21837907", nama: "JOHN DOE", jurusan: "Teknik Informatika", fakultas: "Ilmu Komputer" },
            { nim: "237483129731", nama: "KIPLI", jurusan: "Teknik Informatika", fakultas: "Ilmu Komputer" },
            { nim: "3428749238", nama: "KIJUNG", jurusan: "Teknik Informatika", fakultas: "Ilmu Komputer" },
            { nim: "2372189", nama: "JUKI", jurusan: "Teknik Informatika", fakultas: "Ilmu Komputer" }
        ];
        let editIndex = -1;

        tampilkanData();

        // Fungsi pembantu untuk memperbarui data di LocalStorage browser
        function simpanKeLocalStorage() {
            localStorage.setItem("dataMahasiswa", JSON.stringify(dataMahasiswa));
        }

        function tampilkanData() {
            const tbody = document.getElementById("tabelMahasiswa");
            tbody.innerHTML = ""; 

            dataMahasiswa.forEach((mhs, index) => {
                const row = `
                    <tr>
                        <td>${mhs.nim}</td>
                        <td>${mhs.nama}</td>
                        <td>${mhs.jurusan}</td>
                        <td>${mhs.fakultas}</td>
                        <td>
                            <button class="btn-edit" onclick="persiapanEdit(${index})">Edit</button>
                            <button class="btn-delete" onclick="hapusMahasiswa(${index})">Hapus</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function tambahMahasiswa() {
            const nim = document.getElementById("nim").value.trim();
            const nama = document.getElementById("nama").value.trim().toUpperCase();
            const jurusan = document.getElementById("jurusan").value;
            const fakultas = document.getElementById("fakultas").value;

            if (nim === "" || nama === "") {
                alert("NIM dan Nama tidak boleh kosong!");
                return;
            }

            const cekNim = dataMahasiswa.some(mhs => mhs.nim === nim);
            if (cekNim) {
                alert("NIM sudah terdaftar!");
                return;
            }

            dataMahasiswa.push({ nim, nama, jurusan, fakultas });

            simpanKeLocalStorage(); 

            tampilkanData();
            resetForm();
        }

        function persiapanEdit(index) {
            editIndex = index; 
            const mhs = dataMahasiswa[index];

            document.getElementById("nim").value = mhs.nim;
            document.getElementById("nama").value = mhs.nama;
            document.getElementById("jurusan").value = mhs.jurusan;
            document.getElementById("fakultas").value = mhs.fakultas;

            document.getElementById("btnTambah").style.display = "none";
            document.getElementById("btnUpdate").style.display = "inline-block";
            document.getElementById("btnBatal").style.display = "inline-block";
        }

        function updateMahasiswa() {
            if (editIndex === -1) return;

            const nim = document.getElementById("nim").value.trim();
            const nama = document.getElementById("nama").value.trim().toUpperCase();
            const jurusan = document.getElementById("jurusan").value;
            const fakultas = document.getElementById("fakultas").value;

            if (nim === "" || nama === "") {
                alert("NIM dan Nama tidak boleh kosong!");
                return;
            }

            dataMahasiswa[editIndex] = { nim, nama, jurusan, fakultas };

            simpanKeLocalStorage(); 

            tampilkanData();
            resetForm();
        }

        function hapusMahasiswa(index) {
            if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
                dataMahasiswa.splice(index, 1);
                
                simpanKeLocalStorage(); 
                if (editIndex === index) {
                    resetForm();
                }
                
                tampilkanData();
            }
        }

        function resetForm() {
            document.getElementById("nim").value = "";
            document.getElementById("nama").value = "";
            document.getElementById("jurusan").selectedIndex = 0;
            document.getElementById("fakultas").selectedIndex = 0;
            
            editIndex = -1;

            document.getElementById("btnTambah").style.display = "inline-block";
            document.getElementById("btnUpdate").style.display = "none";
            document.getElementById("btnBatal").style.display = "none";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 3: Kalkulator Web dengan Akar</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1e1e24;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .calculator {
            background-color: #2d2d38;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 320px;
        }
        #display {
            width: 100%;
            height: 60px;
            background-color: #1e1e24;
            border: none;
            outline: none;
            color: #fff;
            text-align: right;
            padding: 10px;
            font-size: 28px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 18px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #3e3e4f;
            color: #fff;
            transition: background 0.2s;
        }
        button:hover { background-color: #4f4f64; }
        button.operator { background-color: #f39c12; color: #fff; }
        button.operator:hover { background-color: #e67e22; }
        button.clear { background-color: #e74c3c; color: #fff; }
        button.clear:hover { background-color: #c0392b; }
        button.equal { background-color: #2ecc71; color: #fff; grid-column: span 2; }
        button.equal:hover { background-color: #27ae60; }
        /* Gaya khusus untuk tombol akar agar terlihat seperti operator */
        button.sqrt { background-color: #f39c12; color: #fff; }
        button.equal { background-color: #2ecc71; color: #fff; }
        
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="clear" onclick="deleteChar()">DEL</button>
            <button class="sqrt" onclick="calculateSquareRoot()">&#8730;</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="calculatePercent()">%</button>
            

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">x</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('00')">00</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculateResult()">=</button>
            <button class="equal" onclick="toggleSign()">+/-</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendValue(val) {
            if (display.value === '' && isNaN(val) && val !== '.') return;
            display.value += val;
        }

        function clearDisplay() {
            display.value = '';
        }
        function deleteChar() {
            display.value = display.value.toString().slice(0, -1);
        }

        function calculateSquareRoot() {
            try {
               
                if (display.value !== "") {
                    const currentExpressionResult = eval(display.value);
                    const result = Math.sqrt(currentExpressionResult);
                    
                    if (isNaN(result)) {
                         display.value = "Error"; 
                    } else {
                        display.value = result;
                    }
                }
            } catch (error) {
                display.value = 'Error';
            }
        }

        function calculateResult() {
            try {
                if(display.value !== "") {
                    display.value = eval(display.value);
                }
            } catch (error) {
                display.value = 'Error';
            }
        }

        function calculatePercent() {
            try {
                if(display.value !==""){
                    const currentval = eval(display.value);
                    display.value = currentval/100;
                }  
            } catch(error){
                display.value = "error";
            }
        }

        function toggleSign() {
    try {
        if (display.value !== "") {
            // Hitung dulu nilai di layar, lalu kalikan dengan -1
            const currentVal = eval(display.value);
            display.value = currentVal * -1;
        }
    } catch (error) {
        display.value = 'Error';
    }
}
        function togglesign(){
            try {
                let currentValue = display.value;
                
                if(currentValue === "") return;
                 
                let evaluatedValue = eval (currentValue);
                
                display.value = evaluatedValue *-1;
            } catch(error){
                display.value ='error';
            }
        }

    </script>
</body>
</html>
